<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קהילת המטפלים</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;300;400;500;600;700&family=Noto+Serif+Hebrew:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family:'Assistant',sans-serif; background:#fdfaf6; }
  .card-shadow { box-shadow:0 20px 60px rgba(139,111,71,0.15),0 4px 16px rgba(0,0,0,0.06); }
  .spinner { width:40px;height:40px;border:3px solid #e8ddd0;border-top-color:#8b6f47;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px; }
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body class="p-4 md:p-8">
<div class="max-w-4xl mx-auto">

  <header class="text-center mb-10">
    <h1 class="text-4xl font-bold text-[#4a3b2a] mb-3">קהילת המטפלים</h1>
    <p class="text-stone-500 font-medium">יצירת כרטיס ביקור מאויר והצטרפות לרשימת המטפלים</p>
  </header>

  <!-- FORM -->
  <div id="view-form" class="max-w-xl mx-auto bg-white p-8 rounded-[2.5rem] shadow-sm border border-stone-100">
    <h2 class="text-2xl font-bold mb-8 text-center text-[#4a3b2a]">הוסיפו את עצמכם לקהילה — יצירת כרטיס ביקור</h2>
    <div class="space-y-5">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input id="in-name" type="text" placeholder="שם מלא *"
          class="w-full p-4 bg-stone-50 rounded-2xl outline-none transition-all"
          style="border:1.5px solid #d8cef5"
          onfocus="this.style.border='2px solid #9b7fd4';this.style.background='#faf8ff'"
          onblur="this.style.border='1.5px solid #d8cef5';this.style.background='#fafaf9'">
        <input id="in-role" type="text" placeholder="רקע מקצועי *"
          class="w-full p-4 bg-stone-50 rounded-2xl outline-none transition-all"
          style="border:1.5px solid #d8cef5"
          onfocus="this.style.border='2px solid #9b7fd4';this.style.background='#faf8ff'"
          onblur="this.style.border='1.5px solid #d8cef5';this.style.background='#fafaf9'">
      </div>
      <textarea id="in-bio" placeholder="רקע טיפולי"
        class="w-full p-4 bg-stone-50 rounded-2xl h-36 outline-none resize-none transition-all"
        style="border:1.5px solid #d8cef5"
        onfocus="this.style.border='2px solid #9b7fd4';this.style.background='#faf8ff'"
        onblur="this.style.border='1.5px solid #d8cef5';this.style.background='#fafaf9'"></textarea>
      <div class="grid grid-cols-2 gap-4">
        <input id="in-phone" type="text" placeholder="טלפון *" dir="rtl"
          class="w-full p-4 bg-stone-50 rounded-2xl outline-none transition-all"
          style="border:1.5px solid #d8cef5"
          onfocus="this.style.border='2px solid #9b7fd4';this.style.background='#faf8ff'"
          onblur="this.style.border='1.5px solid #d8cef5';this.style.background='#fafaf9'">
        <input id="in-loc" type="text" placeholder="מיקום *"
          class="w-full p-4 bg-stone-50 rounded-2xl outline-none transition-all"
          style="border:1.5px solid #d8cef5"
          onfocus="this.style.border='2px solid #9b7fd4';this.style.background='#faf8ff'"
          onblur="this.style.border='1.5px solid #d8cef5';this.style.background='#fafaf9'">
      </div>
      <p id="form-err" class="text-red-400 text-sm text-center hidden"></p>
      <div class="flex justify-center" style="margin-right:20px">
        <button onclick="submitForm()"
          class="px-10 py-3 rounded-2xl font-bold shadow-md hover:brightness-110 transition-all text-base text-white"
          style="background:#8b6f47">
          הצטרפות לקהילה
        </button>
      </div>
    </div>
  </div>

  <!-- LOADING -->
  <div id="view-loading" style="display:none">
    <div class="flex flex-col items-center justify-center py-24">
      <div class="spinner"></div>
      <p class="text-[#8b6f47] font-semibold text-lg mb-2">מייצר את האיור שלך...</p>
      <p class="text-stone-400 text-sm">זה לוקח כ-15 שניות</p>
    </div>
  </div>

  <!-- PREVIEW -->
  <div id="view-preview" style="display:none">
    <div class="flex flex-col items-center">
      <div id="card-capture" class="w-full max-w-2xl rounded-3xl overflow-hidden relative card-shadow"
        style="aspect-ratio:1.75;background:#fdfaf6;">

        <!-- ציור — 50% ימין -->
        <div class="absolute inset-y-0 right-0" style="width:50%;overflow:hidden;">
          <img id="card-img" class="w-full h-full object-cover"
            style="mask-image:linear-gradient(to right,rgba(0,0,0,0) 0%,rgba(0,0,0,0.85) 25%,rgba(0,0,0,1) 50%);
                   -webkit-mask-image:linear-gradient(to right,rgba(0,0,0,0) 0%,rgba(0,0,0,0.85) 25%,rgba(0,0,0,1) 50%);
                   object-position:center;" src="" alt="">
        </div>

        <!-- קו הפרדה -->
        <div class="absolute inset-y-0" style="left:50%;width:1px;background:linear-gradient(to bottom,transparent,#c9a87a66,#c9a87a99,#c9a87a66,transparent);z-index:2;"></div>

        <!-- טקסט — 50% שמאל -->
        <div class="absolute inset-y-0 left-0 flex flex-col justify-center z-10"
          style="width:50%;padding:28px 20px 28px 36px;">
          <h2 id="out-name" style="font-family:'Assistant',sans-serif;font-weight:300;font-size:clamp(28px,5vw,46px);letter-spacing:1px;line-height:1;color:#1a202c;margin-bottom:4px"></h2>
          <div style="font-size:clamp(13px,1.8vw,18px);font-weight:400;color:#4a5568;margin-bottom:28px;position:relative;padding-bottom:14px">
            <span id="out-role"></span>
            <span style="position:absolute;bottom:0;right:0;width:36px;height:1.5px;background:#cbd5e0;border-radius:2px;display:block"></span>
          </div>
          <div style="display:flex;flex-direction:column;gap:12px">
            <div id="out-phone-wrap" style="display:none;flex-direction:column">
              <span style="font-size:10px;text-transform:uppercase;color:#a0aec0;letter-spacing:1.5px;margin-bottom:2px">טלפון</span>
              <span id="out-phone" style="font-size:clamp(14px,2vw,20px);font-weight:400;color:#4a5568"></span>
            </div>
            <div id="out-loc-wrap" style="display:none;flex-direction:column">
              <span style="font-size:10px;text-transform:uppercase;color:#a0aec0;letter-spacing:1.5px;margin-bottom:2px">מיקום</span>
              <span id="out-loc" style="font-size:clamp(14px,2vw,20px);font-weight:400;color:#4a5568"></span>
            </div>
          </div>
        </div>
      </div>

      <p id="preview-err" class="text-red-400 text-sm mt-4 hidden"></p>
      <div class="mt-8 flex gap-4 w-full max-w-md">
        <button onclick="downloadImage()"
          class="flex-1 text-white py-4 rounded-xl font-bold shadow-md hover:brightness-110 transition-all"
          style="background:#8b6f47">💾 שמור תמונה</button>
        <button onclick="backToForm()"
          class="flex-1 bg-white py-4 rounded-xl font-bold border-2 hover:bg-stone-50 transition-all"
          style="color:#8b6f47;border-color:#8b6f47">← מלא שוב</button>
      </div>
    </div>
  </div>

</div>
<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycby6m6V5HLlsoHAGpHAnhWY1Edm4M5DWnIscEgyupSOTQgAJPS44c3Dl4Z3WC3u-Vm13UA/exec";

function show(id) {
  ["view-form","view-loading","view-preview"].forEach(v => {
    document.getElementById(v).style.display = "none";
  });
  document.getElementById(id).style.display = "block";
}

function backToForm() {
  ["in-name","in-role","in-bio","in-phone","in-loc"].forEach(id => {
    document.getElementById(id).value = "";
  });
  document.getElementById("card-img").src = "";
  document.getElementById("out-name").textContent = "";
  document.getElementById("out-role").querySelector("span").textContent = "";
  document.getElementById("out-phone").textContent = "";
  document.getElementById("out-loc").textContent = "";
  document.getElementById("out-phone-wrap").style.display = "none";
  document.getElementById("out-loc-wrap").style.display = "none";
  show("view-form");
}

function buildPrompt(role, bio) {
  const text = (role + " " + bio).toLowerCase().replace(/[,،;\/\-–]/g, ' ');
  const scenes = {
    'עיסוי תאילנדי':'female thai massage therapist in white uniform pressing palms on back of client lying face down on floor mat, side view, clear faces',
    'עיסוי שוודי':'female massage therapist standing beside massage table hands on client back, client lying face down, side view, clear faces',
    'עיסוי רקמות':'massage therapist applying deep pressure with both hands on client back muscles on table, side view, clear faces',
    'עיסוי ספורטאים':'sports massage therapist working on athlete lying on treatment table pressing leg muscles, side view, clear faces',
    'עיסוי אינטגרטיבי':'integrative massage therapist with hands on client lying on massage table, side view, clear faces',
    'עיסוי':'female massage therapist standing beside massage table both hands gently on client back client lying face down, side view, clear faces',
    'מסאז':'massage therapist with caring hands on client lying on treatment table, side view, clear faces',
    'שיאצו':'shiatsu therapist kneeling on floor beside client lying face down on mat pressing with palms on upper back, side view, clear faces, both fully clothed',
    'טווינה':'tuina therapist standing beside treatment table applying hand pressure on client back client lying face down, side view, clear faces',
    'טווינא':'tuina therapist pressing acupressure points on clothed client on table, side view, clear faces',
    'רפלקסולוגיה':'reflexology therapist seated on stool holding client foot in both hands pressing sole, client reclined in chair, side view, clear faces',
    'כף רגל':'reflexologist holding and pressing client foot with both hands seated, side view, clear faces',
    'רגל':'reflexology therapist working on client foot seated facing each other, clear faces',
    'קרניו':'craniosacral therapist standing at head of table hands very gently on client skull, client lying on back, side view, clear faces',
    'צי קונג':'qi gong teacher and student standing facing each other both with arms raised in slow flowing movement, clear faces',
    'יוגה':'yoga therapist kneeling behind seated client hands gently on client shoulders guiding stretch, clear faces',
    'פילאטיס':'pilates instructor kneeling beside client lying on mat guiding leg movement, side view, clear faces',
    'אוסטאופתיה':'osteopath standing beside treatment table hands on client spine client lying face down, side view, clear faces',
    'פלדנקרייז':'feldenkrais practitioner kneeling beside client lying on low table one hand gently on client shoulder, side view, clear faces',
    'ווטסו':'watsu therapist standing in warm water cradling client floating on back, both visible side view, clear faces',
    'נטורופתיה':'naturopath sitting across table from client herbs and plants visible on table, both facing viewer, clear faces',
    'צמחי מרפא':'herbalist at wooden table with fresh plants and remedy bottles preparing natural medicine, clear face',
    'הרבליסט':'clinical herbalist at table with medicinal plants and tincture bottles, clear face',
    'תזונה':'nutritionist sitting with client at table vegetables and healthy foods visible, both facing viewer, clear faces',
    'דיקור':'acupuncturist standing beside treatment table carefully placing needle on client lying face down, side view, clear faces',
    'אקופונקטורה':'acupuncture therapist placing needles on client lying on treatment table, side view, clear faces',
    'רפואה סינית':'traditional chinese medicine doctor sitting across from patient taking pulse herbs visible, both facing viewer, clear faces',
    'הילינג':'energy healer standing beside client lying on table both hands hovering above client chest soft warm light, side view, clear faces',
    'ריקי':'reiki practitioner standing beside client lying on table hands gently placed on client soft golden light, side view, clear faces',
    'נשימה':'breathwork therapist sitting beside client lying on mat one hand on client chest guiding breathing, side view, clear faces',
    'ריברסינג':'rebirthing therapist sitting attentively beside client lying on mat doing breathwork, side view, clear faces',
    'דולה':'birth doula standing behind seated pregnant woman arms around her shoulders in supportive embrace, side view, clear faces',
    'מיינדפולנס':'mindfulness teacher sitting cross-legged facing student in meditation pose both visible, clear faces',
    'מדיטציה':'meditation guide sitting facing client in peaceful meditation pose soft natural light, clear faces',
    'דמיון מודרך':'therapist sitting in chair beside client lying with eyes closed on couch, side view, clear faces',
    'ארומתרפיה':'aromatherapist applying oil to client back with gentle strokes client lying on massage table botanical bottles visible, side view, clear faces',
    'פרחי באך':'therapist sitting across small table from client flower essence dropper bottles between them, both facing viewer, clear faces',
    'קינסיולוגיה':'kinesiologist standing facing client holding client outstretched arm testing muscle response, clear faces',
    'אקותרפיה':'nature therapist and client walking side by side on peaceful forest path both visible, clear faces',
    'פסיכותרפיה':'psychotherapist sitting in chair facing client on couch attentive posture, both visible, clear faces',
    'קואצינג':'life coach sitting across from client both leaning forward in engaged conversation, clear faces',
    'nlp':'coach sitting facing client both in open attentive posture, clear faces',
    'פוקוסינג':'focusing therapist sitting quietly facing client, client with eyes slightly closed, both visible, clear faces',
    'ספורט':'sports therapist standing beside athlete on treatment table hands on athlete leg, side view, clear faces',
    'מטפל':'holistic therapist standing beside treatment table both hands gently on client back client lying face down, side view, clear faces',
    'מטפלת':'holistic therapist standing beside treatment table both hands gently on client back client lying face down, side view, clear faces',
    'כאב':'therapist carefully working on client body with precise healing hands, side view, clear faces',
    'מגע':'holistic touch therapist with warm healing hands on client lying on table, side view, clear faces',
    'הוליסטי':'holistic healer with gentle therapeutic touch on resting client, warm natural healing space, side view, clear faces',
  };

  const sortedKeys = Object.keys(scenes).sort((a,b) => b.length - a.length);
  for (const kw of sortedKeys) {
    if (text.includes(kw)) {
      return `Watercolor illustration: ${scenes[kw]}. Style: soft delicate watercolor painting, light pastel colors blush pink and sage green, white background, elegant, no text, no borders`;
    }
  }

  // אם לא נמצאה מילת מפתח — בנה פרומפט ישירות מהטקסט
  return `Watercolor illustration: ${role} therapist actively treating client, side view, clear faces, healing hands, serene room. Style: soft delicate watercolor painting, light pastel colors, white background, elegant, no text, no borders`;
}

function submitForm() {
  const name  = document.getElementById("in-name").value.trim();
  const role  = document.getElementById("in-role").value.trim();
  const bio   = document.getElementById("in-bio").value.trim();
  const phone = document.getElementById("in-phone").value.trim();
  const loc   = document.getElementById("in-loc").value.trim();
  const errEl = document.getElementById("form-err");

  if (!name || !role || !phone || !loc) {
    errEl.textContent = "נא למלא את כל השדות המסומנים ב-*";
    errEl.classList.remove("hidden");
    return;
  }
  errEl.classList.add("hidden");
  show("view-loading");

  const prompt = buildPrompt(role, bio);
  const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=800&height=600&model=flux&nologo=true&enhance=true&seed=${Date.now()}`;

  // מלא פרטי כרטיס מיד
  document.getElementById("out-name").textContent = name;
  const roleEl = document.getElementById("out-role");
  if (roleEl) {
    const roleSpan = roleEl.querySelector("span");
    if (roleSpan) roleSpan.textContent = role;
    else roleEl.textContent = role;
  }
  const phoneWrap = document.getElementById("out-phone-wrap");
  const locWrap   = document.getElementById("out-loc-wrap");
  if (phoneWrap) { document.getElementById("out-phone").textContent = phone; phoneWrap.style.display = "flex"; }
  if (locWrap)   { document.getElementById("out-loc").textContent = loc;     locWrap.style.display = "flex"; }

  const img = new Image();
  img.crossOrigin = "anonymous";

  const timeout = setTimeout(() => {
    show("view-preview");
  }, 30000);

  img.onload = function() {
    clearTimeout(timeout);
    document.getElementById("card-img").src = imgUrl;
    fetch(SHEET_URL, { method:"POST", mode:"no-cors", headers:{"Content-Type":"application/json"}, body:JSON.stringify({name,role,bio,phone,loc}) }).catch(()=>{});
    show("view-preview");
  };
  img.onerror = function() {
    clearTimeout(timeout);
    show("view-preview");
  };
  img.src = imgUrl;
  img.crossOrigin = "anonymous";

  // Timeout של 30 שניות
  const timeout = setTimeout(() => {
    document.getElementById("card-img").src = imgUrl;
    show("view-preview");
  }, 30000);

  img.onload = function() {
    clearTimeout(timeout);
    document.getElementById("card-img").src = imgUrl;
    fetch(SHEET_URL, { method:"POST", mode:"no-cors", headers:{"Content-Type":"application/json"}, body:JSON.stringify({name,role,bio,phone,loc}) }).catch(()=>{});
    show("view-preview");
  };
  img.src = imgUrl;
}

function downloadImage() {
  html2canvas(document.getElementById("card-capture"), { scale:3, useCORS:true, backgroundColor:"#fdfaf6" })
    .then(canvas => {
      const a = document.createElement("a");
      a.download = "business-card.png";
      a.href = canvas.toDataURL("image/png");
      a.click();
    }).catch(()=> alert("שגיאה בהורדה"));
}
</script>
</body>
</html>
