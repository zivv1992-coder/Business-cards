<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קהילת המטפלים</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Assistant', sans-serif; background-color: #fdfaf6; }
  .watercolor-blend {
    mask-image: linear-gradient(to left, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 95%);
    -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 95%);
  }
  .card-shadow { box-shadow: 0 20px 50px rgba(139,111,71,0.15); }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #e8ddd0;
    border-top-color: #8b6f47;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="p-4 md:p-8">
<div class="max-w-4xl mx-auto">

  <header class="text-center mb-10">
    <h1 class="text-4xl font-bold text-[#4a3b2a] mb-3">קהילת המטפלים</h1>
    <p class="text-stone-500 font-medium">יצירת כרטיס ביקור מאויר והצטרפות לרשימת המטפלים</p>
  </header>

  <!-- FORM -->
  <div id="view-form" class="max-w-xl mx-auto bg-white p-8 rounded-[2.5rem] shadow-sm border border-stone-100">
    <h2 class="text-2xl font-bold mb-8 text-center text-[#4a3b2a]">הוסיפו את עצמכם לקהילה — יצירת כרטיס ביקור</h2>
    <div class="space-y-5">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input id="in-name" type="text" placeholder="שם מלא *"
          class="w-full p-4 bg-stone-50 rounded-2xl outline-none focus:ring-2 ring-[#8b6f47]/20">
        <input id="in-role" type="text" placeholder="רקע מקצועי *"
          class="w-full p-4 bg-stone-50 rounded-2xl outline-none focus:ring-2 ring-[#8b6f47]/20">
      </div>

      <textarea id="in-bio" placeholder="רקע טיפולי"
        class="w-full p-4 bg-stone-50 rounded-2xl h-28 outline-none focus:ring-2 ring-[#8b6f47]/20 resize-none"></textarea>

      <div>
        <label class="block text-sm font-semibold text-stone-500 mb-2">תאר את הטיפול שלך לתמונה (בעברית) *</label>
        <textarea id="in-image-desc" placeholder="למשל: מטפלת מעסה גב של מטופלת על שולחן עיסוי, אווירה רגועה ומקצועית, תאורה חמה..."
          class="w-full p-4 bg-stone-50 rounded-2xl h-28 outline-none focus:ring-2 ring-[#8b6f47]/20 resize-none"></textarea>
        <p class="text-xs text-stone-400 mt-1">התיאור יתורגם לאנגלית אוטומטית לפני יצירת התמונה</p>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <input id="in-phone" type="text" placeholder="טלפון" dir="ltr"
          class="w-full p-4 bg-stone-50 rounded-2xl outline-none focus:ring-2 ring-[#8b6f47]/20">
        <input id="in-loc" type="text" placeholder="עיר / מיקום"
          class="w-full p-4 bg-stone-50 rounded-2xl outline-none focus:ring-2 ring-[#8b6f47]/20">
      </div>

      <p id="form-err" class="text-red-400 text-sm text-center hidden"></p>

      <div class="flex justify-center">
        <button id="btn-submit" onclick="submitForm()"
          class="px-10 py-3 rounded-2xl font-bold shadow-md hover:brightness-110 transition-all text-base text-white"
          style="background:#8b6f47">
          הצטרפות לקהילה
        </button>
      </div>

    </div>
  </div>

  <!-- LOADING -->
  <div id="view-loading" style="display:none;">
    <div class="flex flex-col items-center justify-center py-24">
      <div class="spinner"></div>
      <p class="text-[#8b6f47] font-semibold text-lg mb-2">מייצר את האיור שלך...</p>
      <p class="text-stone-400 text-sm">זה לוקח כ-10 שניות</p>
    </div>
  </div>

  <!-- PREVIEW -->
  <div id="view-preview" style="display:none;">
    <div class="flex flex-col items-center">

      <div id="card-capture"
        class="w-full max-w-2xl bg-[#fdfaf6] rounded-3xl overflow-hidden flex relative border border-stone-200 card-shadow"
        style="aspect-ratio:1.75">
        <div class="flex-[1.2] relative overflow-hidden bg-white">
          <img id="card-img" class="w-full h-full object-cover watercolor-blend" src="" alt="">
        </div>
        <div class="flex-1 flex flex-col justify-center p-8 z-10 text-[#2a2118]">
          <h2 id="out-name" class="text-3xl font-bold mb-1"></h2>
          <p id="out-role" class="text-sm font-bold uppercase tracking-widest mb-5 text-[#8b6f47]"></p>
          <div class="w-10 h-1 mb-6 rounded bg-[#8b6f47]"></div>
          <div class="space-y-2 text-xs font-semibold opacity-70">
            <div id="out-phone"></div>
            <div id="out-loc"></div>
          </div>
        </div>
      </div>

      <p id="preview-err" class="text-red-400 text-sm mt-4 hidden"></p>

      <div class="mt-8 flex gap-4 w-full max-w-md">
        <button onclick="downloadImage()"
          class="flex-1 text-white py-4 rounded-xl font-bold shadow-md hover:brightness-110 transition-all"
          style="background:#8b6f47">
          💾 שמור תמונה
        </button>
        <button onclick="backToForm()"
          class="flex-1 bg-white py-4 rounded-xl font-bold border-2 hover:bg-stone-50 transition-all"
          style="color:#8b6f47; border-color:#8b6f47">
          ← מלא שוב
        </button>
      </div>

    </div>
  </div>

</div>
<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycby6m6V5HLlsoHAGpHAnhWY1Edm4M5DWnIscEgyupSOTQgAJPS44c3Dl4Z3WC3u-Vm13UA/exec";

function show(id) {
  ["view-form","view-loading","view-preview"].forEach(v => {
    document.getElementById(v).style.display = "none";
  });
  document.getElementById(id).style.display = "block";
}

function backToForm() {
  show("view-form");
}

async function submitForm() {
  const name      = document.getElementById("in-name").value.trim();
  const role      = document.getElementById("in-role").value.trim();
  const bio       = document.getElementById("in-bio").value.trim();
  const imageDesc = document.getElementById("in-image-desc").value.trim();
  const phone     = document.getElementById("in-phone").value.trim();
  const loc       = document.getElementById("in-loc").value.trim();
  const errEl     = document.getElementById("form-err");

  if (!name || !role) {
    errEl.textContent = "נא למלא שם מלא ורקע מקצועי";
    errEl.classList.remove("hidden");
    return;
  }
  errEl.classList.add("hidden");
  show("view-loading");

  // Translate Hebrew to English using MyMemory (free, no key needed)
  let englishDesc = `${role} therapist treatment, minimalist watercolor style`;
  if (imageDesc) {
    try {
      const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(imageDesc)}&langpair=he|en`);
      const data = await res.json();
      if (data.responseStatus === 200) {
        englishDesc = data.responseData.translatedText;
      }
    } catch(e) {
      // fallback to default
    }
  }

  // Generate image via Pollinations flux-schnell
  const prompt = `Minimalist watercolor illustration for a business card. ${englishDesc}. Style: simple clean watercolor painting, soft pastel colors only, white background, delicate brush strokes, no text, no borders, elegant and professional.`;
  const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=800&height=600&model=flux-schnell&nologo=true&seed=${Date.now()}`;

  // Preload image
  const img = new Image();
  img.crossOrigin = "anonymous";
  img.onload = () => {
    document.getElementById("card-img").src = imgUrl;
    document.getElementById("out-name").textContent = name;
    document.getElementById("out-role").textContent = role;
    document.getElementById("out-phone").textContent = phone ? "📞 " + phone : "";
    document.getElementById("out-loc").textContent   = loc   ? "📍 " + loc   : "";
    document.getElementById("preview-err").classList.add("hidden");

    // Save to Google Sheets (silent)
    fetch(SHEET_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, role, bio, phone, loc })
    }).catch(() => {});

    show("view-preview");
  };
  img.onerror = () => {
    document.getElementById("preview-err").textContent = "שגיאה בטעינת התמונה — נסה שוב";
    document.getElementById("preview-err").classList.remove("hidden");
    show("view-preview");
  };
  img.src = imgUrl;
}

function downloadImage() {
  html2canvas(document.getElementById("card-capture"), { scale: 3, useCORS: true })
    .then(canvas => {
      const a = document.createElement("a");
      a.download = "business-card.png";
      a.href = canvas.toDataURL("image/png");
      a.click();
    }).catch(() => alert("שגיאה בהורדה"));
}
</script>
</body>
</html>
