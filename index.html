<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קהילת המטפלים</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&family=Noto+Serif+Hebrew:wght@300;400;600;700&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Assistant', sans-serif; background-color: #fdfaf6; }
  .card-font { font-family: 'Frank Ruhl Libre', serif; }
  .watercolor-blend {
    mask-image: linear-gradient(to left, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 92%);
    -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 92%);
  }
  .card-shadow { box-shadow: 0 20px 60px rgba(139,111,71,0.18), 0 4px 16px rgba(0,0,0,0.06); }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #e8ddd0;
    border-top-color: #8b6f47;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="p-4 md:p-8">
<div class="max-w-4xl mx-auto">

  <header class="text-center mb-10">
    <h1 class="text-4xl font-bold text-[#4a3b2a] mb-3">קהילת המטפלים</h1>
    <p class="text-stone-500 font-medium">יצירת כרטיס ביקור מאויר והצטרפות לרשימת המטפלים</p>
  </header>

  <!-- FORM -->
  <div id="view-form" class="max-w-xl mx-auto bg-white p-8 rounded-[2.5rem] shadow-sm border border-stone-100">
    <h2 class="text-2xl font-bold mb-8 text-center text-[#4a3b2a]">הוסיפו את עצמכם לקהילה — יצירת כרטיס ביקור</h2>
    <div class="space-y-5">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input id="in-name" type="text" placeholder="שם מלא *"
          class="w-full p-4 bg-stone-50 rounded-2xl outline-none transition-all"
          style="border:1.5px solid #d8cef5"
          onfocus="this.style.border='2px solid #9b7fd4';this.style.background='#faf8ff'"
          onblur="this.style.border='1.5px solid #d8cef5';this.style.background='#fafaf9'">
        <input id="in-role" type="text" placeholder="רקע מקצועי *"
          class="w-full p-4 bg-stone-50 rounded-2xl outline-none transition-all"
          style="border:1.5px solid #d8cef5"
          onfocus="this.style.border='2px solid #9b7fd4';this.style.background='#faf8ff'"
          onblur="this.style.border='1.5px solid #d8cef5';this.style.background='#fafaf9'">
      </div>

      <textarea id="in-bio" placeholder="רקע טיפולי"
        class="w-full p-4 bg-stone-50 rounded-2xl h-36 outline-none resize-none transition-all"
        style="border:1.5px solid #d8cef5"
        onfocus="this.style.border='2px solid #9b7fd4';this.style.background='#faf8ff'"
        onblur="this.style.border='1.5px solid #d8cef5';this.style.background='#fafaf9'"></textarea>

      <div class="grid grid-cols-2 gap-4">
        <input id="in-phone" type="text" placeholder="טלפון *" dir="rtl"
          class="w-full p-4 bg-stone-50 rounded-2xl outline-none transition-all"
          style="border:1.5px solid #d8cef5"
          onfocus="this.style.border='2px solid #9b7fd4';this.style.background='#faf8ff'"
          onblur="this.style.border='1.5px solid #d8cef5';this.style.background='#fafaf9'">
        <input id="in-loc" type="text" placeholder="מיקום *"
          class="w-full p-4 bg-stone-50 rounded-2xl outline-none transition-all"
          style="border:1.5px solid #d8cef5"
          onfocus="this.style.border='2px solid #9b7fd4';this.style.background='#faf8ff'"
          onblur="this.style.border='1.5px solid #d8cef5';this.style.background='#fafaf9'">
      </div>

      <p id="form-err" class="text-red-400 text-sm text-center hidden"></p>

      <div class="flex justify-center" style="margin-right:20px">
        <button id="btn-submit" onclick="submitForm()"
          class="px-10 py-3 rounded-2xl font-bold shadow-md hover:brightness-110 transition-all text-base text-white"
          style="background:#8b6f47">
          הצטרפות לקהילה
        </button>
      </div>

    </div>
  </div>

  <!-- LOADING -->
  <div id="view-loading" style="display:none">
    <div class="flex flex-col items-center justify-center py-24">
      <div class="spinner"></div>
      <p class="text-[#8b6f47] font-semibold text-lg mb-2">מייצר את האיור שלך...</p>
      <p class="text-stone-400 text-sm">זה לוקח כ-20 שניות</p>
    </div>
  </div>

  <!-- PREVIEW -->
  <div id="view-preview" style="display:none">
    <div class="flex flex-col items-center">
      <div id="card-capture"
        class="w-full max-w-2xl rounded-3xl overflow-hidden relative card-shadow"
        style="aspect-ratio:1.75; background: #fdfaf6;">

        <!-- Illustration — right side, smaller -->
        <div class="absolute inset-y-0 right-0" style="width:30%; overflow:hidden;">
          <img id="card-img" class="w-full h-full object-cover"
            style="mask-image: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,0.85) 30%, rgba(0,0,0,1) 55%);
                   -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,0.85) 30%, rgba(0,0,0,1) 55%);
                   object-position: center;" src="" alt="">
        </div>

        <!-- Divider line -->
        <div class="absolute inset-y-0" style="left:70%; width:1px; background: linear-gradient(to bottom, transparent, #c9a87a66, #c9a87a99, #c9a87a66, transparent); z-index:2;"></div>

        <!-- Text — left side, bigger -->
        <div class="absolute inset-y-0 left-0 flex flex-col justify-center z-10"
          style="width:70%; padding: 28px 24px 28px 36px;">
          <h2 id="out-name" class="font-bold mb-3"
            style="font-family:'Noto Serif Hebrew',serif; font-size:clamp(34px,6vw,50px); letter-spacing:-0.5px; line-height:1.15; color:#2a2118"></h2>
          <p id="out-role"
            style="font-family:'Noto Serif Hebrew',serif; font-weight:300; font-size:clamp(15px,2.2vw,20px); letter-spacing:0.8px; color:#8b6f47; margin-bottom:16px;"></p>
          <div style="width:32px;height:1.5px;background:#8b6f47;opacity:0.45;margin-bottom:14px;border-radius:2px"></div>
          <div style="font-family:'Assistant',sans-serif;font-size:clamp(12px,1.8vw,16px);color:#2a2118;opacity:0.65;line-height:2">
            <div id="out-phone"></div>
            <div id="out-loc"></div>
          </div>
        </div>

      </div>

      <p id="preview-err" class="text-red-400 text-sm mt-4 hidden"></p>

      <div class="mt-8 flex gap-4 w-full max-w-md">
        <button onclick="downloadImage()"
          class="flex-1 text-white py-4 rounded-xl font-bold shadow-md hover:brightness-110 transition-all"
          style="background:#8b6f47">
          💾 שמור תמונה
        </button>
        <button onclick="backToForm()"
          class="flex-1 bg-white py-4 rounded-xl font-bold border-2 hover:bg-stone-50 transition-all"
          style="color:#8b6f47;border-color:#8b6f47">
          ← מלא שוב
        </button>
      </div>
    </div>
  </div>

</div>
<script>
const HF_TOKEN  = "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";
const SHEET_URL = "https://script.google.com/macros/s/AKfycby6m6V5HLlsoHAGpHAnhWY1Edm4M5DWnIscEgyupSOTQgAJPS44c3Dl4Z3WC3u-Vm13UA/exec";

function show(id) {
  ["view-form","view-loading","view-preview"].forEach(v => {
    document.getElementById(v).style.display = "none";
  });
  document.getElementById(id).style.display = "block";
}

function backToForm() { show("view-form"); }

async function generateImage(prompt) {
  const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=800&height=600&model=flux&nologo=true&enhance=true&seed=${Date.now()}`;
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => resolve(url);
    img.onerror = () => reject(new Error("שגיאה בטעינת התמונה"));
    img.src = url;
  });
}

async function submitForm() {
  const name  = document.getElementById("in-name").value.trim();
  const role  = document.getElementById("in-role").value.trim();
  const bio   = document.getElementById("in-bio").value.trim();
  const phone = document.getElementById("in-phone").value.trim();
  const loc   = document.getElementById("in-loc").value.trim();
  const errEl = document.getElementById("form-err");

  if (!name || !role || !phone || !loc) {
    errEl.textContent = "נא למלא את כל השדות המסומנים ב-*";
    errEl.classList.remove("hidden");
    return;
  }
  errEl.classList.add("hidden");
  show("view-loading");

  // Build smart prompt using Claude API
  let imagePrompt = `minimalist watercolor illustration of a therapist treating a client, soft pastel colors, white background`;
  try {
    const claudeRes = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 150,
        messages: [{
          role: "user",
          content: `Create a SHORT English image prompt (max 40 words) for a minimalist watercolor business card illustration showing a real therapy scene.
Therapist info:
- Profession: ${role}
- Background: ${bio || "holistic therapy"}

Instructions:
- Read BOTH the profession AND background carefully to understand what this therapist actually does
- If the profession is unclear, infer from the background text what kind of therapy is being performed
- Show a REAL SCENE matching the therapy: 
  * Massage → therapist's hands on client lying on treatment table
  * Shiatsu → therapist pressing on client lying on floor
  * Reflexology → hands working on client's foot
  * Yoga/movement → figure in a yoga pose or guided stretch
  * Energy healing → hands hovering above lying client
  * If unclear → gentle hands-on healing scene
- Simple elegant watercolor figures, soft flowing lines
- 2-3 soft pastel colors only
- Pure white background, no text, no borders
Return ONLY the image prompt.`
        }]
      })
    });
    const claudeData = await claudeRes.json();
    const generated = claudeData.content?.[0]?.text?.trim();
    if (generated) imagePrompt = generated;
  } catch(e) {
    // fallback
  }

  const prompt = `${imagePrompt}, soft watercolor style, delicate brush strokes, 2-3 pastel colors, pure white background, no text, elegant minimal business card illustration`;

  try {
    const imgUrl = await generateImage(prompt);

    document.getElementById("out-name").textContent = name;
    document.getElementById("out-role").innerHTML = `<span>${role}</span><span style="position:absolute;bottom:0;right:0;width:40px;height:2px;background:#cbd5e0;border-radius:2px;display:block"></span>`;

    const phoneWrap = document.getElementById("out-phone-wrap");
    const locWrap = document.getElementById("out-loc-wrap");
    if (phone) {
      document.getElementById("out-phone").textContent = phone;
      phoneWrap.style.display = "flex";
    }
    if (loc) {
      document.getElementById("out-loc").textContent = loc;
      locWrap.style.display = "flex";
    }
    document.getElementById("preview-err").classList.add("hidden");

    fetch(SHEET_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, role, bio, phone, loc })
    }).catch(() => {});

    show("view-preview");

  } catch(err) {
    show("view-form");
    errEl.textContent = "שגיאה: " + err.message;
    errEl.classList.remove("hidden");
  }
}

function downloadImage() {
  html2canvas(document.getElementById("card-capture"), { scale: 3, useCORS: true })
    .then(canvas => {
      const a = document.createElement("a");
      a.download = "business-card.png";
      a.href = canvas.toDataURL("image/png");
      a.click();
    }).catch(() => alert("שגיאה בהורדה"));
}
</script>
</body>
</html>
