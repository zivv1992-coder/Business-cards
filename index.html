<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קהילת המטפלים</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Assistant', sans-serif; background-color: #fdfaf6; }
  .watercolor-blend {
    mask-image: linear-gradient(to left, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 95%);
    -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 95%);
  }
  .card-shadow { box-shadow: 0 20px 50px rgba(139,111,71,0.15); }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #e8ddd0;
    border-top-color: #7c5cbf;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="p-4 md:p-8">
<div class="max-w-4xl mx-auto">

  <header class="text-center mb-10">
    <h1 class="text-4xl font-bold text-[#4a3b2a] mb-3">קהילת המטפלים</h1>
    <p class="text-stone-500 font-medium">יצירת כרטיס ביקור מאויר והצטרפות לרשימת המטפלים</p>
  </header>

  <!-- FORM -->
  <div id="view-form" class="max-w-xl mx-auto bg-white p-8 rounded-[2.5rem] shadow-sm border border-stone-100">
    <h2 class="text-2xl font-bold mb-8 text-center text-[#4a3b2a]">הוסיפו את עצמכם לקהילה — יצירת כרטיס ביקור</h2>
    <div class="space-y-5">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input id="in-name" type="text" placeholder="שם מלא *" class="w-full p-4 bg-stone-50 rounded-2xl outline-none focus:ring-2 ring-[#7c5cbf]/20 border border-transparent focus:border-[#7c5cbf]/30">
        <input id="in-role" type="text" placeholder="רקע מקצועי *" class="w-full p-4 bg-stone-50 rounded-2xl outline-none focus:ring-2 ring-[#7c5cbf]/20 border border-transparent focus:border-[#7c5cbf]/30">
      </div>
      <textarea id="in-bio" placeholder="רקע טיפולי" class="w-full p-4 bg-stone-50 rounded-2xl h-32 outline-none focus:ring-2 ring-[#7c5cbf]/20 resize-none border border-transparent focus:border-[#7c5cbf]/30"></textarea>
      <div class="grid grid-cols-2 gap-4">
        <input id="in-phone" type="text" placeholder="טלפון" dir="ltr" class="w-full p-4 bg-stone-50 rounded-2xl outline-none focus:ring-2 ring-[#7c5cbf]/20">
        <input id="in-loc" type="text" placeholder="עיר / מיקום" class="w-full p-4 bg-stone-50 rounded-2xl outline-none focus:ring-2 ring-[#7c5cbf]/20">
      </div>
      <p id="form-err" class="text-red-400 text-sm text-center hidden"></p>
      <div class="flex justify-center">
        <button onclick="submitForm()" id="btn-submit" class="px-10 py-3 rounded-2xl font-bold shadow-md hover:brightness-110 transition-all text-base text-white" style="background:#8b6f47">
          הצטרפות לקהילה
        </button>
      </div>
    </div>
  </div>

  <!-- LOADING -->
  <div id="view-loading" style="display:none" class="flex flex-col items-center justify-center py-24">
    <div class="spinner"></div>
    <p class="text-[#7c5cbf] font-semibold text-lg mb-2">Gemini מציירת עבורך...</p>
    <p class="text-stone-400 text-sm">זה לוקח כ-10 שניות</p>
  </div>

  <!-- PREVIEW -->
  <div id="view-preview" style="display:none" class="flex flex-col items-center">
    <div id="card-capture" class="w-full max-w-2xl bg-[#fdfaf6] rounded-3xl overflow-hidden flex relative border border-stone-200 card-shadow" style="aspect-ratio:1.75">
      <div class="flex-[1.2] relative overflow-hidden bg-white">
        <img id="card-img" class="w-full h-full object-cover watercolor-blend" src="" alt="">
      </div>
      <div class="flex-1 flex flex-col justify-center p-8 z-10 text-[#2a2118]">
        <h2 id="out-name" class="text-3xl font-bold mb-1"></h2>
        <p id="out-role" class="text-sm font-bold uppercase tracking-widest mb-5 text-[#7c5cbf]"></p>
        <div class="w-10 h-1 mb-6 rounded" style="background:#7c5cbf"></div>
        <div class="space-y-2 text-xs font-semibold opacity-70">
          <div id="out-phone"></div>
          <div id="out-loc"></div>
        </div>
      </div>
    </div>
    <p id="preview-err" class="text-red-400 text-sm mt-4 hidden"></p>
    <div class="mt-8 flex gap-4 w-full max-w-md">
      <button onclick="downloadImage()" class="flex-1 text-white py-4 rounded-xl font-bold shadow-md hover:brightness-110 transition-all" style="background:#7c5cbf">שמור תמונה</button>
      <button onclick="backToForm()" class="flex-1 bg-white py-4 rounded-xl font-bold border-2 hover:bg-stone-50 transition-all" style="color:#7c5cbf;border-color:#7c5cbf">מלא שוב</button>
    </div>
  </div>

</div>
<script>
const API_KEY = "AIzaSyD1oIXHdYMA2gGVrRghMnCq46DZpnoBAMk";
const SHEET_URL = "https://script.google.com/macros/s/AKfycby6m6V5HLlsoHAGpHAnhWY1Edm4M5DWnIscEgyupSOTQgAJPS44c3Dl4Z3WC3u-Vm13UA/exec";
const MODEL = "gemini-2.5-flash-image";

function show(id) {
  ["view-form","view-loading","view-preview"].forEach(v => {
    const el = document.getElementById(v);
    el.style.display = "none";
    el.classList.remove("flex");
  });
  const target = document.getElementById(id);
  target.style.display = (id === "view-form") ? "block" : "flex";
  if (id !== "view-form") target.classList.add("flex");
}

function backToForm() {
  show("view-form");
}

async function submitForm() {
  const name  = document.getElementById("in-name").value.trim();
  const role  = document.getElementById("in-role").value.trim();
  const bio   = document.getElementById("in-bio").value.trim();
  const phone = document.getElementById("in-phone").value.trim();
  const loc   = document.getElementById("in-loc").value.trim();
  const errEl = document.getElementById("form-err");

  const imageDesc = document.getElementById("in-image-desc").value.trim();

  if (!name || !role) {
    errEl.textContent = "נא למלא שם מלא ורקע מקצועי";
    errEl.classList.remove("hidden");
    return;
  }
  errEl.classList.add("hidden");
  show("view-loading");

  // Translate Hebrew description to English using Claude API
  let englishDesc = imageDesc || `${role} therapist performing a treatment, professional watercolor style, serene healing atmosphere`;
  if (imageDesc) {
    try {
      const translateRes = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 300,
          messages: [{
            role: "user",
            content: `Translate this Hebrew text to English for an image generation prompt. Return ONLY the English translation, nothing else: "${imageDesc}"`
          }]
        })
      });
      const translateData = await translateRes.json();
      englishDesc = translateData.content?.[0]?.text || englishDesc;
    } catch(e) {
      // fallback to original if translation fails
    }
  }

  const prompt = `Minimalist watercolor illustration for a business card. ${englishDesc}. Style: simple clean watercolor painting, soft pastel colors only, white background, delicate brush strokes, no text, no borders, elegant and professional, suitable for a business card.`;

  try {
    const encodedPrompt = encodeURIComponent(prompt);
    const imgUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=800&height=600&model=flux-schnell&nologo=true&seed=${Date.now()}`;
    document.getElementById("card-img").src = imgUrl;
    document.getElementById("out-name").textContent = name;
    document.getElementById("out-role").textContent = role;
    document.getElementById("out-phone").textContent = phone ? "📞 " + phone : "";
    document.getElementById("out-loc").textContent   = loc   ? "📍 " + loc   : "";
    document.getElementById("preview-err").classList.add("hidden");

    // Save to Google Sheets
    fetch(SHEET_URL, {
      method: "POST",
      body: JSON.stringify({ name, role, bio, phone, loc }),
    }).catch(() => {});

    show("view-preview");

  } catch(err) {
    show("view-form");
    errEl.textContent = "שגיאה: " + err.message;
    errEl.classList.remove("hidden");
  }
}

function downloadImage() {
  html2canvas(document.getElementById("card-capture"), { scale: 3, useCORS: true }).then(canvas => {
    const a = document.createElement("a");
    a.download = "business-card.png";
    a.href = canvas.toDataURL("image/png");
    a.click();
  });
}
</script>
</body>
</html>
