<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קהילת המטפלים</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;300;400;500;600;700&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  body { font-family:'Assistant',sans-serif; background:#fdfaf6; }
  .card-shadow { box-shadow:0 20px 60px rgba(139,111,71,0.15),0 4px 16px rgba(0,0,0,0.06); }
  .spinner { width:40px;height:40px;border:3px solid #e8ddd0;border-top-color:#8b6f47;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px; }
  @keyframes spin{to{transform:rotate(360deg)}}
  .field-wrap { display:flex;flex-direction:column;margin-bottom:16px; }
  .field-label { font-size:12px;font-weight:500;color:#888;margin-bottom:5px; }
  input,textarea {
    width:100%;padding:10px 14px;border-radius:10px;
    border:1.5px solid #d8cef5;background:#fff;
    font-family:'Assistant',sans-serif;font-size:14px;
    outline:none;direction:rtl;box-sizing:border-box;
    transition:border 0.2s,background 0.2s;color:#2a2118;
  }
  input:focus,textarea:focus { border:2px solid #9b7fd4;background:#faf8ff; }
  textarea { resize:none;height:90px;line-height:1.65; }
  .btn-main {
    width:100%;padding:13px;border-radius:12px;border:none;
    background:#8b6f47;color:#fff;font-family:'Assistant',sans-serif;
    font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;
    transition:opacity 0.2s;
  }
  .btn-main:hover{opacity:0.88}
  .btn-main:disabled{opacity:0.5;cursor:not-allowed}
  .watercolor-blob { position:absolute;filter:blur(50px);opacity:0.22;border-radius:50%;z-index:1; }
</style>
</head>
<body class="p-4 md:p-8">
<div class="max-w-4xl mx-auto">

  <header class="text-center mb-10">
    <h1 class="text-4xl font-bold text-[#4a3b2a] mb-3">קהילת המטפלים</h1>
    <p class="text-stone-500 font-medium">יצירת כרטיס ביקור מאויר והצטרפות לרשימת המטפלים</p>
  </header>

  <!-- FORM -->
  <div id="view-form" class="max-w-xl mx-auto bg-white p-8 rounded-[2.5rem] shadow-sm border border-stone-100">
    <h2 class="text-2xl font-bold mb-8 text-center text-[#4a3b2a]">הוסיפו את עצמכם לקהילה — יצירת כרטיס ביקור</h2>
    <div class="space-y-5">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input id="in-name" type="text" placeholder="שם מלא *"
          class="w-full p-4 bg-stone-50 rounded-2xl outline-none transition-all"
          style="border:1.5px solid #d8cef5"
          onfocus="this.style.border='2px solid #9b7fd4';this.style.background='#faf8ff'"
          onblur="this.style.border='1.5px solid #d8cef5';this.style.background='#fafaf9'">
        <input id="in-role" type="text" placeholder="רקע מקצועי *"
          class="w-full p-4 bg-stone-50 rounded-2xl outline-none transition-all"
          style="border:1.5px solid #d8cef5"
          onfocus="this.style.border='2px solid #9b7fd4';this.style.background='#faf8ff'"
          onblur="this.style.border='1.5px solid #d8cef5';this.style.background='#fafaf9'">
      </div>

      <textarea id="in-bio" placeholder="רקע טיפולי"
        class="w-full p-4 bg-stone-50 rounded-2xl h-36 outline-none resize-none transition-all"
        style="border:1.5px solid #d8cef5"
        onfocus="this.style.border='2px solid #9b7fd4';this.style.background='#faf8ff'"
        onblur="this.style.border='1.5px solid #d8cef5';this.style.background='#fafaf9'"></textarea>

      <div class="grid grid-cols-2 gap-4">
        <input id="in-phone" type="text" placeholder="טלפון *" dir="rtl"
          class="w-full p-4 bg-stone-50 rounded-2xl outline-none transition-all"
          style="border:1.5px solid #d8cef5"
          onfocus="this.style.border='2px solid #9b7fd4';this.style.background='#faf8ff'"
          onblur="this.style.border='1.5px solid #d8cef5';this.style.background='#fafaf9'">
        <input id="in-loc" type="text" placeholder="מיקום *"
          class="w-full p-4 bg-stone-50 rounded-2xl outline-none transition-all"
          style="border:1.5px solid #d8cef5"
          onfocus="this.style.border='2px solid #9b7fd4';this.style.background='#faf8ff'"
          onblur="this.style.border='1.5px solid #d8cef5';this.style.background='#fafaf9'">
      </div>

      <p id="form-err" class="text-red-400 text-sm text-center hidden"></p>

      <div class="flex justify-center" style="margin-right:20px">
        <button id="btn-submit" onclick="submitForm()"
          class="px-10 py-3 rounded-2xl font-bold shadow-md hover:brightness-110 transition-all text-base text-white"
          style="background:#8b6f47">
          הצטרפות לקהילה
        </button>
      </div>

    </div>
  </div>

  <!-- LOADING -->
  <div id="view-loading" style="display:none">
    <div class="flex flex-col items-center justify-center py-24">
      <div class="spinner"></div>
      <p class="text-[#8b6f47] font-semibold text-lg mb-2">מייצר את האיור שלך...</p>
      <p class="text-stone-400 text-sm">זה לוקח כ-15 שניות</p>
    </div>
  </div>

  <!-- PREVIEW -->
  <div id="view-preview" style="display:none">
    <div class="flex flex-col items-center">

      <!-- CARD -->
      <div id="card-capture" style="
        width:100%;max-width:680px;height:380px;
        background:#fff;border-radius:20px;
        box-shadow:0 10px 40px rgba(0,0,0,0.06);
        display:flex;overflow:hidden;position:relative;
        border:1px solid #f2f2f2;font-family:'Assistant',sans-serif;
      ">
        <!-- Text section -->
        <div style="flex:1.3;padding:50px 50px 50px 50px;display:flex;flex-direction:column;justify-content:center;z-index:10;background:white;position:relative">

          <h2 id="out-name" style="font-family:'Assistant',sans-serif;font-weight:300;font-size:clamp(36px,5.5vw,58px);letter-spacing:1px;line-height:1;color:#1a202c;margin-bottom:4px"></h2>

          <div id="out-role-wrap" style="font-size:clamp(14px,2vw,22px);font-weight:400;color:#4a5568;margin-bottom:36px;position:relative;display:inline-block;padding-bottom:14px">
            <span id="out-role"></span>
            <span style="position:absolute;bottom:0;right:0;width:40px;height:2px;background:#cbd5e0;border-radius:2px;display:block"></span>
          </div>

          <div style="display:flex;flex-direction:column;gap:14px">
            <div id="out-phone-wrap" style="display:none;flex-direction:column">
              <span style="font-size:clamp(9px,1vw,11px);text-transform:uppercase;color:#a0aec0;letter-spacing:1.5px;margin-bottom:2px">טלפון</span>
              <span id="out-phone" style="font-size:clamp(16px,2.2vw,22px);font-weight:400;color:#4a5568"></span>
            </div>
            <div id="out-loc-wrap" style="display:none;flex-direction:column">
              <span style="font-size:clamp(9px,1vw,11px);text-transform:uppercase;color:#a0aec0;letter-spacing:1.5px;margin-bottom:2px">מיקום</span>
              <span id="out-loc" style="font-size:clamp(16px,2.2vw,22px);font-weight:400;color:#4a5568"></span>
            </div>
          </div>
        </div>

        <!-- Visual section -->
        <div style="flex:1;position:relative;background:#fafafa;display:flex;justify-content:center;align-items:center;overflow:hidden">
          <div class="watercolor-blob" style="width:300px;height:300px;background:#90cdf4;top:-10%;right:-15%"></div>
          <div class="watercolor-blob" style="width:250px;height:250px;background:#68d391;bottom:0;right:0"></div>
          <div class="watercolor-blob" style="width:180px;height:180px;background:#f6e05e;top:30%;right:20%"></div>
          <img id="card-img" style="position:absolute;width:90%;height:90%;object-fit:cover;z-index:5;opacity:0.85;
            mask-image:radial-gradient(ellipse at center, black 40%, transparent 80%);
            -webkit-mask-image:radial-gradient(ellipse at center, black 40%, transparent 80%);"
            src="" alt="">
        </div>
      </div>

      <p id="preview-err" class="text-red-400 text-sm mt-4 hidden"></p>

      <div class="mt-8 flex gap-4 w-full max-w-md justify-center">
        <button onclick="downloadImage()" class="btn-main" style="width:auto;padding:11px 28px">💾 שמור תמונה</button>
        <button onclick="backToForm()" style="padding:11px 20px;border-radius:12px;cursor:pointer;border:2px solid #8b6f47;background:transparent;color:#8b6f47;font-family:'Assistant',sans-serif;font-size:14px;font-weight:600">← מלא שוב</button>
      </div>
    </div>
  </div>

</div>
<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycby6m6V5HLlsoHAGpHAnhWY1Edm4M5DWnIscEgyupSOTQgAJPS44c3Dl4Z3WC3u-Vm13UA/exec";

function show(id) {
  ["view-form","view-loading","view-preview"].forEach(v => {
    document.getElementById(v).style.display = "none";
  });
  document.getElementById(id).style.display = "block";
}

function backToForm() {
  // Reset form
  document.getElementById("in-name").value = "";
  document.getElementById("in-role").value = "";
  document.getElementById("in-bio").value = "";
  document.getElementById("in-phone").value = "";
  document.getElementById("in-loc").value = "";
  // Reset card
  document.getElementById("card-img").src = "";
  document.getElementById("out-name").textContent = "";
  document.getElementById("out-role").textContent = "";
  document.getElementById("out-phone").textContent = "";
  document.getElementById("out-loc").textContent = "";
  const phoneWrap = document.getElementById("out-phone-wrap");
  const locWrap = document.getElementById("out-loc-wrap");
  if (phoneWrap) phoneWrap.style.display = "none";
  if (locWrap) locWrap.style.display = "none";
  show("view-form");
}

function buildPrompt(role, bio) {
  const text = (role + " " + bio).toLowerCase();
  const scenes = {
    'עיסוי תאילנדי':'female thai massage therapist in white uniform pressing palms on back of client lying face down on floor mat, side view, clear faces, traditional thai bodywork, serene',
    'עיסוי שוודי':'female massage therapist standing beside massage table, hands on client back, client lying face down, side view, clear faces, professional spa setting',
    'עיסוי רקמות':'massage therapist applying deep pressure with both hands on client back muscles, client lying on massage table, side view, clear faces',
    'עיסוי ספורטאים':'sports massage therapist working on athlete lying on treatment table, therapist pressing on leg muscles, side view, clear faces',
    'עיסוי אינטגרטיבי':'massage therapist with hands on client lying on massage table, soft healing touch, side view, clear faces, professional setting',
    'עיסוי':'female massage therapist standing beside massage table, both hands gently on client back, client lying face down, side view, clear faces, peaceful room',
    'מסאז':'massage therapist with caring hands on client lying on treatment table, side view, clear faces',
    'שיאצו':'shiatsu therapist kneeling on floor beside client lying face down on mat, pressing with palms on client upper back, side view, clear faces, both fully clothed',
    'טווינה':'tuina therapist standing beside treatment table, applying hand pressure on client back, client lying face down, side view, clear faces, Chinese medicine setting',
    'טווינא':'tuina therapist pressing acupressure points on clothed client on table, side view, clear faces',
    'רפלקסולוגיה':'reflexology therapist seated on stool, holding client foot in both hands, pressing sole, client reclined in chair, side view, clear faces, calm setting',
    'כף רגל':'reflexologist holding and pressing client foot with both hands, seated, side view, clear faces',
    'רגל':'reflexology therapist working on client foot, seated facing each other, clear faces',
    'קרניו':'craniosacral therapist standing at head of table, hands very gently on client skull, client lying on back, side view, clear faces, serene room',
    'צי קונג':'qi gong teacher and student standing facing each other, both with arms raised in slow flowing movement, clear faces, peaceful studio',
    'יוגה':'yoga therapist kneeling behind seated client, hands gently on client shoulders guiding stretch, clear faces, soft natural light',
    'פילאטיס':'pilates instructor kneeling beside client lying on mat, guiding client leg movement, side view, clear faces',
    'אוסטאופתיה':'osteopath standing beside treatment table, hands on client spine, client lying face down, side view, clear faces, clinical setting',
    'פלדנקרייז':'feldenkrais practitioner kneeling beside client lying on low table, one hand gently on client shoulder, side view, clear faces',
    'ווטסו':'watsu therapist standing in warm water, cradling client floating on back, both visible from side, clear faces, pool setting',
    'נטורופתיה':'naturopath sitting across table from client, herbs and plants visible on table, both facing slightly toward viewer, clear faces, warm office',
    'צמחי מרפא':'herbalist standing at wooden table with fresh plants and remedy bottles, preparing natural medicine, clear face, warm natural setting',
    'הרבליסט':'clinical herbalist at table with medicinal plants and tincture bottles, clear face, professional natural setting',
    'תזונה':'nutritionist sitting with client at table, vegetables and healthy foods visible, both facing viewer, clear faces, bright consultation room',
    'דיקור':'acupuncturist standing beside treatment table, carefully placing needle on client lying face down, side view, clear faces, serene clinical setting',
    'אקופונקטורה':'acupuncture therapist placing needles on client lying on treatment table, side view, clear faces',
    'רפואה סינית':'traditional chinese medicine doctor sitting across from patient, taking pulse, herbs visible, both facing viewer, clear faces',
    'הילינג':'energy healer standing beside client lying on table, both hands hovering above client chest, soft warm light between hands, side view, clear faces',
    'ריקי':'reiki practitioner standing beside client lying on table, hands gently placed on client, soft golden light, side view, clear faces',
    'נשימה':'breathwork therapist sitting beside client lying on mat, one hand on client chest guiding breathing, side view, clear faces',
    'ריברסינג':'rebirthing therapist sitting attentively beside client lying on mat doing breathwork, side view, clear faces, calm room',
    'דולה':'birth doula standing behind seated pregnant woman, arms around her shoulders in supportive embrace, side view, clear faces, warm setting',
    'מיינדפולנס':'mindfulness teacher sitting cross-legged facing student in meditation pose, both visible, clear faces, peaceful bright room',
    'מדיטציה':'meditation guide sitting facing client in peaceful meditation pose, soft natural light, both visible, clear faces',
    'דמיון מודרך':'therapist sitting in chair beside client lying with eyes closed on couch, side view, clear faces, quiet therapy room',
    'ארומתרפיה':'aromatherapist applying oil to client back with gentle strokes, client lying on massage table, botanical bottles visible, side view, clear faces',
    'פרחי באך':'therapist sitting across small table from client, flower essence dropper bottles between them, both facing slightly toward viewer, clear faces',
    'קינסיולוגיה':'kinesiologist standing facing client, holding client outstretched arm, testing muscle response, clear faces, professional setting',
    'אקותרפיה':'nature therapist and client walking side by side on peaceful forest path, both visible, clear faces, sunlight through trees',
    'פסיכותרפיה':'psychotherapist sitting in chair facing client on couch, attentive posture, both visible, clear faces, warm therapy room',
    'קואצינג':'life coach sitting across from client, both leaning forward in engaged conversation, clear faces, bright professional office',
    'nlp':'coach sitting facing client, both in open attentive posture, clear faces, modern office setting',
    'פוקוסינג':'focusing therapist sitting quietly facing client, client with eyes slightly closed, both visible, clear faces, quiet room',
    'ספורט':'sports therapist standing beside athlete on treatment table, hands on athlete leg, side view, clear faces',
  };

  // נקה פסיקים ותווים מיוחדים וחפש כל מילה בנפרד
  const words = text.replace(/[,،;\/\-–]/g, ' ').split(/\s+/).filter(w => w.length > 1);
  
  // חפש התאמה — קודם ביטויים ארוכים, אחר כך קצרים
  let scene = null;
  const sortedKeys = Object.keys(scenes).sort((a,b) => b.length - a.length);
  
  // נסה התאמה מלאה
  for (const kw of sortedKeys) {
    if (text.includes(kw)) { scene = scenes[kw]; break; }
  }
  
  // אם לא נמצאה מילת מפתח — תמיד שולח ל-AI להבנה חכמה
  if (!scene) {
    try {
      const q = encodeURIComponent(`You are an expert at creating image prompts for therapist business cards.
Read this therapist description carefully and create a SHORT English image prompt (max 35 words) showing a real specific therapy scene that matches what this therapist does.
Profession: ${role}
Background: ${bio || role}
Rules: 
- Understand what kind of therapy this is from context
- Show therapist actively treating client in a scene specific to this therapy
- side view, clear faces, specific therapy action
- watercolor style
Return ONLY the image prompt, nothing else.`);
      const res = await fetch(`https://text.pollinations.ai/${q}?model=openai`);
      const generated = (await res.text()).trim();
      if (generated && generated.length > 10) {
        scene = generated;
      } else {
        // אם ה-API החזיר ריק — תן לו לנסות שוב בשאלה פשוטה יותר
        const q2 = encodeURIComponent(`Create a 30-word image prompt for a watercolor business card showing: ${role}. ${bio}. Show therapist and client, side view, clear faces.`);
        const res2 = await fetch(`https://text.pollinations.ai/${q2}?model=openai`);
        scene = (await res2.text()).trim() || `${role} therapist treating client, side view, clear faces, watercolor style`;
      }
    } catch(e) {
      scene = `${role} therapist treating client, healing hands, side view, clear faces, watercolor style`;
    }
  }

  return `Watercolor illustration: ${scene}. Style: soft delicate watercolor painting, light pastel colors blush pink and sage green, white background, elegant, no text, no borders, business card illustration`;
}

async function submitForm() {
  const name  = document.getElementById("in-name").value.trim();
  const role  = document.getElementById("in-role").value.trim();
  const bio   = document.getElementById("in-bio").value.trim();
  const phone = document.getElementById("in-phone").value.trim();
  const loc   = document.getElementById("in-loc").value.trim();
  const errEl = document.getElementById("form-err");

  if (!name || !role || !phone || !loc) {
    errEl.textContent = "נא למלא את כל השדות המסומנים ב-*";
    errEl.classList.remove("hidden");
    return;
  }
  errEl.classList.add("hidden");
  show("view-loading");

  // Fill card text
  document.getElementById("out-name").textContent = name;
  document.getElementById("out-role").textContent = role;

  const phoneEl   = document.getElementById("out-phone");
  const locEl     = document.getElementById("out-loc");
  const phoneWrap = document.getElementById("out-phone-wrap");
  const locWrap   = document.getElementById("out-loc-wrap");
  if (phoneEl && phoneWrap && phone) { phoneEl.textContent = phone; phoneWrap.style.display = "flex"; }
  if (locEl && locWrap && loc)       { locEl.textContent = loc;     locWrap.style.display = "flex"; }

  // Build prompt from keywords — no external API needed
  const prompt = buildPrompt(role, bio);
  const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=800&height=600&model=flux&nologo=true&enhance=true&seed=${Date.now()}`;

  const img = new Image();
  img.crossOrigin = "anonymous";
  img.onload = () => {
    document.getElementById("card-img").src = imgUrl;
    document.getElementById("preview-err").classList.add("hidden");
    fetch(SHEET_URL, { method:"POST", mode:"no-cors", headers:{"Content-Type":"application/json"}, body:JSON.stringify({name,role,bio,phone,loc}) }).catch(()=>{});
    show("view-preview");
  };
  img.onerror = () => {
    document.getElementById("card-img").src = imgUrl;
    show("view-preview");
  };
  img.src = imgUrl;
}

function downloadImage() {
  html2canvas(document.getElementById("card-capture"), { scale:3, useCORS:true, backgroundColor:"#ffffff" })
    .then(canvas => {
      const a = document.createElement("a");
      a.download = "business-card.png";
      a.href = canvas.toDataURL("image/png");
      a.click();
    }).catch(()=> alert("שגיאה בהורדה"));
}
</script>
</body>
</html>
